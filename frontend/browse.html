<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Browse the contents of <?= $versionString ?> for the <?= $deviceName ?> right from your browser.">
  <meta name="theme-color" content="#FFFFFF">

  <meta property="og:type" content="website">
  <meta property="og:url" content="<?= $url ?>">
  <meta property="og:title" content="<?= $versionString ?> (<?= $deviceName ?>) - Browse IPSW">
  <meta property="og:description" content="Browse the contents of <?= $versionString ?> for the <?= $deviceName ?> right from your browser.">

  <title>Browse IPSW - <?= $versionString ?> (<?= $deviceName ?>)</title>

  <script src="/js/main.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="icon" href="/assets/icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 dark:bg-neutral-900">
  <div id="init-page" class="flex flex-col gap-4 h-screen items-center justify-center absolute left-0 right-0 invisible">
    <img src="/assets/logo.png" alt="easyIPSW" class="h-20">
    <div id="init-progress-bar" class="w-1/5 h-2 bg-slate-200 rounded-full min-w-80 dark:bg-neutral-700 overflow-hidden">
      <div id="init-progress-bar-fill" class="h-full bg-blue-400"></div>
    </div>
    <div id="init-status-text" class="font-[Inter] text-sm text-slate-900 dark:text-neutral-50">Status</div>
  </div>

  <div id="listing-page" class="flex flex-col sm:flex-row h-screen items-center justify-start absolute left-0 right-0 invisible pt-25 sm:pt-14">
    <div class="bg-slate-200 dark:bg-neutral-800 fixed w-screen h-25 sm:h-14 top-0 border-b-2 border-solid border-slate-300 dark:border-neutral-700 flex flex-col sm:flex-row items-center justify-center sm:justify-start pt-2 pb-2 sm:pt-0 sm:pb-0 sm:ps-4 sm:pe-4 gap-1 sm:gap-4">
      <img src="/assets/logo.png" alt="easyIPSW" class="h-20 sm:h-full hidden sm:block">
      <div class="font-[Inter] text-slate-900 dark:text-neutral-50"><?= $versionString ?> (<?= $deviceName ?>)</div>
      <div class="font-[Inter] text-slate-600 dark:text-neutral-400 text-xs">(<?= $ipswId ?>)</div>
      <div class="sm:ms-auto flex flex-row items-center justify-center sm:justify-end gap-4 mt-2 sm:m-0">
        <a href="download" class="font-[Inter] text-slate-900 dark:text-neutral-50 hover:underline">Download IPSW</a>
        <a href="keys" class="font-[Inter] text-slate-900 dark:text-neutral-50 hover:underline">View keys</a>
      </div>
    </div>

    <div id="listing-files-view" class="flex flex-col p-4 h-1/3 w-full sm:h-full sm:w-1/4 sm:max-w-100 sm:min-w-60 bg-slate-100 dark:bg-neutral-800 border-b-2 sm:border-r-2 sm:border-b-0 border-solid border-slate-200 dark:border-neutral-700 overflow-y-auto">
      <div id="listing-path" class="font-[Inter] text-slate-600 text-sm ml-2 dark:text-neutral-400 mb-2 invisible">/path</div>
      <div id="listing-file-template" class="group/file font-[Inter] p-3 hover:bg-slate-200 dark:hover:bg-neutral-700 rounded-xl transition cursor-pointer flex flex-row gap-2 items-center hidden">
        <img data-field="icon" src="/assets/file.svg" alt="Directory" class="min-w-5 h-5 dark:invert object-contain">
        <div class="flex flex-row items-baseline grow min-w-0">
          <div data-field="filename" class="text-slate-900 dark:text-neutral-50 overflow-hidden min-w-0 grow whitespace-nowrap text-ellipsis text-sm">Filename</div>
          <div data-field="tag" class="text-xs text-slate-600 dark:text-neutral-400 ms-auto group-hover/file:hidden whitespace-nowrap hidden">(Tag)</div>
        </div>
        <img data-field="dir-arrow" src="/assets/chevron-right.svg" alt="Browse directory" class="h-5 dark:invert ms-auto hidden">
      </div>
    </div>

    <div class="grow w-screen sm:w-auto sm:h-full flex flex-col justify-center items-center">
      <div class="font-[Inter] text-slate-600 dark:text-neutral-400">Select a file to view it</div>
    </div>
  </div>
</body>
</html>
